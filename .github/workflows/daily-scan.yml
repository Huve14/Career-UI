name: Daily UAE Job Scan

on:
  schedule:
    # 06:00 UAE time (GST = UTC+4) = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run portal scan
        run: node scan.mjs
        env:
          # scan.mjs is zero-token — no API keys needed for ATS sources
          # WebSearch-based queries are skipped in non-interactive mode
          CI: true

      - name: Commit new jobs to pipeline
        run: |
          git config user.name  "career-ops[bot]"
          git config user.email "career-ops[bot]@users.noreply.github.com"
          git add data/pipeline.md data/scan-history.tsv
          # Only commit if there are staged changes
          git diff --cached --quiet && echo "No new jobs found." || git commit -m "scan: daily UAE job scan $(date -u +%Y-%m-%d)"

      - name: Push results
        run: git push
