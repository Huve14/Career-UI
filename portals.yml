# Portal Scanner Configuration — UAE Job Market
# Configured for the UAE / GCC / MENA region.
# Run: /career-ops scan  (or  node scan.mjs)
#
# [CUSTOMIZE] Update title_filter.positive with YOUR target role keywords.
# [CUSTOMIZE] Add your target companies to tracked_companies.

# -- Location filter --
# Focuses results on UAE and the broader GCC/MENA region.
location_filter:
  always_allow:
    - "Dubai"
    - "Abu Dhabi"
    - "UAE"
    - "United Arab Emirates"
  allow:
    - "Remote"
    - "Dubai"
    - "Abu Dhabi"
    - "Sharjah"
    - "UAE"
    - "United Arab Emirates"
    - "GCC"
    - "MENA"
    - "Gulf"
    - "Saudi Arabia"
    - "Riyadh"
    - "Doha"
    - "Qatar"
    - "Bahrain"
    - "Kuwait"
  block:
    - "India"
    - "United States"
    - "USA"
    - "United Kingdom"
    - "London"
    - "Germany"
    - "France"
    - "Singapore"
    - "Australia"
    - "Brazil"
    - "Canada"

# -- Title filter --
# [CUSTOMIZE] Replace / extend with YOUR target roles.
# At least 1 positive must match AND 0 negatives must match.

title_filter:
  positive:
    # Huveshan's target roles — Data / BI / IT / Automation
    - "Data Analyst"
    - "Business Intelligence"
    - "BI Analyst"
    - "BI Developer"
    - "Data Engineer"
    - "Analytics Engineer"
    - "Reporting Analyst"
    - "IT Specialist"
    - "IT Manager"
    - "Systems Administrator"
    - "IT Administrator"
    - "Cloud Administrator"
    - "Microsoft 365"
    - "M365"
    - "Automation Engineer"
    - "Automation Analyst"
    - "Workflow Automation"
    - "RPA"
    - "Power BI"
    - "Data Visualization"
    - "ETL"
    - "Data Warehouse"
    - "SQL Developer"
    - "AI Automation"
    - "Solutions Architect"
    - "Technical Analyst"
    - "Digital Transformation"
    - "Cybersecurity Analyst"
    - "Information Security"
    - "IT Infrastructure"
  negative:
    - "Intern"
    - "Junior"
    - "Trainee"
    - "Blockchain"
    - "Crypto"
    - "Web3"
    - "COBOL"
    - "Mainframe"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Staff"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries — UAE / GCC job portals --
search_queries:

  # -- LinkedIn UAE --
  - name: LinkedIn — UAE Tech Roles
    query: 'site:linkedin.com/jobs "UAE" OR "Dubai" OR "Abu Dhabi" ("Software Engineer" OR "AI Engineer" OR "Product Manager" OR "Solutions Architect")'
    enabled: true

  - name: LinkedIn — UAE Senior Tech
    query: 'site:linkedin.com/jobs "Dubai" OR "UAE" (Senior OR Lead OR Head) ("Engineer" OR "Architect" OR "Manager")'
    enabled: true

  # -- Bayt.com (leading MENA job portal) --
  - name: Bayt — Tech & Engineering
    query: 'site:bayt.com "Software Engineer" OR "AI Engineer" OR "Cloud Engineer" OR "Data Engineer" Dubai OR "Abu Dhabi" OR UAE'
    enabled: true

  - name: Bayt — Product & Management
    query: 'site:bayt.com "Product Manager" OR "Project Manager" OR "Solutions Architect" Dubai OR UAE'
    enabled: true

  # -- GulfTalent --
  - name: GulfTalent — Tech Roles
    query: 'site:gulftalent.com "Software Engineer" OR "IT Manager" OR "Data" OR "AI" UAE OR Dubai OR "Abu Dhabi"'
    enabled: true

  # -- Naukri Gulf --
  - name: NaukriGulf — Engineering
    query: 'site:naukrigulf.com "Software Engineer" OR "AI" OR "Cloud" OR "DevOps" Dubai OR UAE'
    enabled: true

  - name: NaukriGulf — Data & Analytics
    query: 'site:naukrigulf.com "Data Scientist" OR "Data Engineer" OR "Analytics" OR "Machine Learning" UAE OR "GCC"'
    enabled: true

  # -- Indeed UAE --
  - name: Indeed UAE — Tech
    query: 'site:ae.indeed.com "Software Engineer" OR "AI Engineer" OR "Product Manager" OR "Solutions Architect"'
    enabled: true

  # -- Dubizzle (UAE classifieds + jobs) --
  - name: Dubizzle Jobs — Tech
    query: 'site:dubizzle.com/jobs "Software" OR "Engineer" OR "Developer" OR "IT" Dubai'
    enabled: true

  # -- GulfJobs / GulfJobSeeker --
  - name: GulfJobSeeker — Engineering
    query: 'site:gulfjobseeker.com "Software Engineer" OR "Developer" OR "IT" UAE OR Dubai'
    enabled: true

  # -- Greenhouse (companies with UAE offices) --
  - name: Greenhouse — UAE / MENA
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Dubai" OR "UAE" OR "Abu Dhabi" OR "MENA"'
    enabled: true

  # -- Ashby — UAE / MENA --
  - name: Ashby — UAE / MENA
    query: 'site:jobs.ashbyhq.com "Dubai" OR "UAE" OR "Abu Dhabi" OR "MENA"'
    enabled: true

  # -- Lever — UAE --
  - name: Lever — UAE Roles
    query: 'site:jobs.lever.co "Dubai" OR "UAE" OR "Abu Dhabi" OR "MENA"'
    enabled: true

  # -- Remote + UAE/MENA friendly --
  - name: Himalayas — Remote MENA
    query: 'site:himalayas.app "MENA" OR "UAE" OR "Dubai" OR "Remote"'
    enabled: true

  - name: WeWorkRemotely — MENA friendly
    query: 'site:weworkremotely.com "MENA" OR "UAE" OR "Gulf" OR "Middle East"'
    enabled: true

  # -- Tech-specific UAE --
  - name: GITEX / UAE Tech Jobs
    query: '"Dubai" OR "UAE" ("AI Engineer" OR "Machine Learning" OR "Cloud Architect" OR "DevOps") job 2025 OR 2026'
    enabled: true

  # -- Startups UAE --
  - name: UAE Startups — YC / Global
    query: 'site:workatastartup.com "UAE" OR "Dubai" OR "MENA" OR "Middle East"'
    enabled: true

  - name: UAE Startups — Wamda / MAGNiTT ecosystem
    query: '"UAE" OR "Dubai" startup ("Software Engineer" OR "CTO" OR "VP Engineering" OR "Product Manager") job 2025 OR 2026'
    enabled: true

